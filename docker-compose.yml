version: '3.8'

services:
  tod-pdf-service:
    build: .
    container_name: tod-pdf-service
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      LOG_LEVEL: DEBUG
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: logboek-pdfs
    volumes:
      - .:/app
    depends_on:
      - minio
    networks:
      - tod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - tod-network

volumes:
  minio-data:

networks:
  tod-network:
    driver: bridge
